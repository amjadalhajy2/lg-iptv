<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>Stream IPTV - Professional TV UI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0a0a0a; --primary: #e50914; --text: #ffffff; --card-w: 16vw; --card-h: 24vw; }
        body { 
            background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; overflow-x: hidden; overflow-y: auto; user-select: none;
        }
        ::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }

        /* شريط الإشعارات المتطاير (Toast) */
        #toast {
            visibility: hidden; min-width: 25vw; background-color: rgba(229, 9, 20, 0.95); color: #fff;
            text-align: center; border-radius: 0.5vw; padding: 1vw 2vw; position: fixed;
            z-index: 10000; right: 2vw; bottom: 4vh; font-size: 1.3vw; font-weight: bold;
            box-shadow: 0 1vh 3vh rgba(0,0,0,0.8); transition: opacity 0.4s, transform 0.4s; 
            opacity: 0; transform: translateY(2vh); backdrop-filter: blur(5px);
        }
        #toast.show { visibility: visible; opacity: 1; transform: translateY(0); }

        /* الشريط العلوي */
        header {
            position: fixed; top: 0; width: 100%; height: 12vh; padding: 0 4vw;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, transparent 100%);
            display: flex; align-items: center; justify-content: space-between; z-index: 100; box-sizing: border-box;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8); transition: background 0.3s;
        }
        header.scrolled { background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); border-bottom: 0.1vw solid rgba(255,255,255,0.1); }
        .logo { font-size: 2.5vw; font-weight: 900; color: var(--primary); letter-spacing: 2px; }
        .nav-links { display: flex; gap: 2vw; align-items: center; }
        .nav-item { background: transparent; border: none; color: white; font-size: 1.5vw; font-weight: 600; opacity: 0.7; cursor: pointer; padding: 0.5vw 1vw; outline: none; border-radius: 5px; transition: 0.3s; }
        .nav-item:focus, .nav-item:hover, .nav-item.active { opacity: 1; transform: scale(1.1); background: rgba(255,255,255,0.15); }
        
        /* مربع البحث الفاخر */
        .search-box input {
            background: rgba(255,255,255,0.15); border: 0.1vw solid rgba(255,255,255,0.3);
            color: white; padding: 0.8vw 1.5vw; border-radius: 30px; font-size: 1.2vw;
            outline: none; transition: 0.3s; width: 14vw; font-family: inherit;
        }
        .search-box input:focus { background: rgba(0,0,0,0.9); width: 24vw; border-color: var(--primary); box-shadow: 0 0 1.5vw var(--primary); }
        .user-info { display: flex; align-items: center; gap: 1vw; font-size: 1.3vw; font-weight: bold; }

        /* منطقة المحتوى */
        #main-content { padding-top: 15vh; min-height: 100vh; padding-bottom: 5vh; }
        .row-container { margin-bottom: 5vh; position: relative; }
        .row-title { font-size: 1.8vw; font-weight: bold; margin: 0 4vw 2vh 0; opacity: 0.9; text-shadow: 1px 1px 3px black; }
        .row-inner { display: flex; gap: 1.5vw; overflow-x: auto; padding: 1vh 4vw; scroll-behavior: smooth; }
        
        /* أزرار التمرير الجانبي */
        .scroll-btn {
            position: absolute; top: 55%; transform: translateY(-50%);
            background: rgba(20,20,20,0.6); color: white; border: 0.1vw solid rgba(255,255,255,0.2);
            font-size: 2vw; width: 4vw; height: 4vw; border-radius: 50%; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);
            transition: 0.3s; outline: none;
        }
        .scroll-btn:focus, .scroll-btn:hover { background: var(--primary); border-color: white; transform: translateY(-50%) scale(1.1); }
        .scroll-btn.right { right: 1vw; }
        .scroll-btn.left { left: 1vw; }

        /* البطاقات */
        .card {
            flex: 0 0 auto; width: var(--card-w); height: var(--card-h); border-radius: 0.5vw; overflow: hidden; position: relative;
            background: #222; cursor: pointer; outline: none; transition: transform 0.3s ease, border 0.3s ease;
            padding: 0; margin: 0; border: 0.3vw solid transparent; display: block;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card:focus, .card:hover { transform: scale(1.08) translateY(-1vh); border-color: white; z-index: 5; box-shadow: 0 2vh 4vh rgba(0,0,0,0.9); }
        .progress-bar { position: absolute; bottom: 0; width: 100%; height: 0.8vh; background: rgba(0,0,0,0.6); }
        .progress-fill { height: 100%; background: var(--primary); }

        /* شاشة التفاصيل المقسمة الاحترافية */
        #details-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 200;
            padding: 8vh 4vw; box-sizing: border-box; background-size: cover; background-position: center;
            box-shadow: inset 0 0 70vw 40vw rgba(0,0,0,0.95); overflow-y: auto;
        }
        .details-layout { display: flex; gap: 5vw; height: 100%; }
        .details-right { width: 35%; display: flex; flex-direction: column; gap: 2vh; }
        .details-poster { width: 100%; border-radius: 1vw; box-shadow: 0 2vh 5vh rgba(0,0,0,0.9); }
        .details-title { font-size: 3.5vw; font-weight: bold; margin: 0; text-shadow: 2px 2px 5px black; }
        .details-meta { font-size: 1.3vw; color: #ccc; font-weight: 600; display: flex; gap: 1vw; }
        .details-desc { font-size: 1.2vw; line-height: 1.6; opacity: 0.85; text-shadow: 1px 1px 3px black; }

        .details-left { width: 65%; display: flex; flex-direction: column; gap: 4vh; padding-top: 2vh; }
        .action-bar { display: flex; gap: 2vw; align-items: center; flex-wrap: wrap; }
        .action-btn { background: var(--text); color: black; border: none; padding: 1.5vh 3vw; font-size: 1.5vw; font-weight: bold; border-radius: 0.5vw; cursor: pointer; outline: none; transition: 0.3s; }
        .action-btn.fav { background: rgba(40,40,40,0.8); color: white; border: 0.1vw solid white; backdrop-filter: blur(5px); }
        .action-btn:focus, .action-btn:hover { transform: scale(1.05); background: var(--primary); color: white; border-color: var(--primary); }
        
        .seasons-select { background: rgba(30,30,30,0.8); color: white; padding: 1.5vh 2vw; font-size: 1.5vw; border: 0.1vw solid white; border-radius: 0.5vw; outline: none; cursor: pointer; }
        .seasons-select:focus { border-color: var(--primary); background: #000; }
        
        .episodes-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(18vw, 1fr)); gap: 1.5vw; overflow-y: auto; max-height: 60vh; padding-bottom: 5vh; }
        .ep-card { background: rgba(40,40,40,0.9); padding: 2vh; border-radius: 0.5vw; cursor: pointer; outline: none; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; border: 0.1vw solid transparent; color: white; font-size: 1.2vw; }
        .ep-card:focus, .ep-card:hover { background: var(--text); color: black; transform: scale(1.05); border-color: white; }

        /* النوافذ الفرعية */
        #profiles-screen, #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--bg); position: fixed; top:0; width:100%; z-index: 500; }
        .profiles-container { display: flex; gap: 3vw; margin-top: 5vh; flex-wrap: wrap; justify-content: center; }
        .profile-card { width: 12vw; height: 12vw; background: #222; border-radius: 1vw; display: flex; align-items: center; justify-content: center; font-size: 2.5vw; font-weight: bold; cursor: pointer; outline: none; transition: 0.3s; border: 0.2vw solid transparent; color: white; }
        .profile-card:focus, .profile-card:hover { background: var(--text); color: black; transform: scale(1.1); border-color: var(--primary); }
        .login-box input { width: 25vw; padding: 1.5vh; margin: 1vh 0; font-size: 1.2vw; border-radius: 5px; border: none; outline: none; font-family: inherit; }
        .login-box button { width: 25vw; padding: 1.5vh; font-size: 1.5vw; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 2vh; }

        #add-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; padding: 4vw; border-radius: 1vw; text-align: center; border: 0.1vw solid #444; }
        .modal-box input { width: 20vw; padding: 1.5vw; font-size: 1.5vw; margin: 2vw 0; border-radius: 5px; border: none; outline: none; text-align: center; }

        #player-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; }
        video { width: 100%; height: 100%; outline: none; background: #000; }
    </style>
</head>
<body>

    <div id="toast">إشعار</div>

    <div id="login-screen">
        <div class="login-box" style="text-align: center;">
            <h1 style="color: var(--primary); font-size: 3vw;">STREAM</h1>
            <input type="text" id="iptv-domain" class="focusable" placeholder="رابط السيرفر">
            <input type="text" id="iptv-user" class="focusable" placeholder="اسم المستخدم">
            <input type="password" id="iptv-pass" class="focusable" placeholder="كلمة المرور">
            <button class="focusable" onclick="login()">تسجيل الدخول</button>
        </div>
    </div>

    <div id="add-modal" class="hidden">
        <div class="modal-box">
            <h2 style="margin:0;">اسم المستخدم الجديد</h2>
            <input type="text" id="new-profile-input" class="focusable" placeholder="اكتب الاسم هنا...">
            <br>
            <button class="action-btn focusable" onclick="saveNewProfile()">حفظ وإنشاء</button>
            <button class="action-btn fav focusable" onclick="document.getElementById('add-modal').classList.add('hidden')">إلغاء</button>
        </div>
    </div>

    <div id="profiles-screen" class="hidden">
        <h1 style="font-size: 3vw;">من يشاهد الآن؟</h1>
        <div class="profiles-container" id="profiles-list"></div>
        <button class="action-btn focusable" style="margin-top:5vh;" onclick="openAddProfileModal()">+ مستخدم جديد</button>
    </div>

    <div id="main-screen" class="hidden">
        <header id="main-header">
            <div class="logo">STREAM</div>
            <div class="nav-links">
                <button class="nav-item active focusable" onclick="loadPage('movies')">الأفلام</button>
                <button class="nav-item focusable" onclick="loadPage('series')">المسلسلات</button>
                <button class="nav-item focusable" onclick="loadPage('live')">القنوات</button>
                <button class="nav-item focusable" onclick="loadPage('favorites')">مفضلاتي</button>
                <div class="search-box">
                    <input type="text" id="search-input" class="focusable" placeholder="🔍 ابحث هنا علامياً..." onkeyup="handleSearch()">
                </div>
            </div>
            <div class="user-info">
                <span id="current-profile-name"></span>
                <button class="nav-item focusable" style="font-size: 1.2vw;" onclick="changeProfile()">تبديل</button>
            </div>
        </header>

        <div id="main-content">
            <div id="continue-watching-container"></div>
            <div id="rows-container"></div>
        </div>
    </div>

    <div id="details-screen" class="hidden">
        <div class="details-layout">
            <div class="details-right">
                <img id="detail-poster" class="details-poster" src="">
                <h1 id="detail-title" class="details-title"></h1>
                <div class="details-meta" id="detail-meta"></div>
                <p class="details-desc" id="detail-desc"></p>
            </div>
            <div class="details-left">
                <div class="action-bar" id="detail-actions"></div>
                <div id="episodes-container" class="episodes-list"></div>
            </div>
        </div>
    </div>

    <div id="player-container" class="hidden">
        <video id="tv-video" controls autoplay playsinline webkit-playsinline></video>
    </div>

<script>
    const supabaseUrl = 'https://kpfymvtyqbyjmlqfgujo.supabase.co';
    const supabaseKey = 'sb_publishable_g7dHfpmPHcQwAWsO9FFuGw_4lG8fyLc';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let iptv = { domain: '', user: '', pass: '' };
    let currentProfile = '';
    let currentTab = 'movies'; // متغير تتبع التبويب المفتوح حالياً لخدمة محرك البحث
    let isPlaying = false;
    let activeStreamData = null; 
    let searchTimeout = null;

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 4000);
    }

    window.onload = () => {
        if(localStorage.getItem('iptv_user')) {
            iptv = {
                domain: localStorage.getItem('iptv_domain'),
                user: localStorage.getItem('iptv_user'),
                pass: localStorage.getItem('iptv_pass')
            };
            fetchProfilesFromSupabase();
        }
    };

    function login() {
        iptv.domain = document.getElementById('iptv-domain').value.trim();
        iptv.user = document.getElementById('iptv-user').value.trim();
        iptv.pass = document.getElementById('iptv-pass').value.trim();
        if(!iptv.user) return;
        iptv.domain = iptv.domain.endsWith('/') ? iptv.domain.slice(0, -1) : iptv.domain;
        
        localStorage.setItem('iptv_domain', iptv.domain);
        localStorage.setItem('iptv_user', iptv.user);
        localStorage.setItem('iptv_pass', iptv.pass);
        fetchProfilesFromSupabase();
    }

    async function fetchProfilesFromSupabase() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('profiles-screen').classList.remove('hidden');
        
        const container = document.getElementById('profiles-list');
        container.innerHTML = '<h2>جاري جلب المستخدمين...</h2>';

        try {
            const { data, error } = await supabaseClient.from('profiles').select('profile_name').eq('username', iptv.user);
            if(error) throw error; container.innerHTML = '';
            
            if(data && data.length > 0) {
                data.forEach(p => renderProfileCard(p.profile_name));
            } else {
                await supabaseClient.from('profiles').insert([{ username: iptv.user, profile_name: 'العائلة' }]);
                renderProfileCard('العائلة');
            }
        } catch (e) { container.innerHTML = '<h2>خطأ في الاتصال بقاعدة البيانات</h2>'; }
    }

    function renderProfileCard(name) {
        const card = document.createElement('button');
        card.className = 'profile-card focusable';
        card.innerText = name; card.onclick = () => selectProfile(name);
        document.getElementById('profiles-list').appendChild(card);
    }

    function openAddProfileModal() {
        document.getElementById('new-profile-input').value = '';
        document.getElementById('add-modal').classList.remove('hidden');
        document.getElementById('new-profile-input').focus();
    }

    async function saveNewProfile() {
        let name = document.getElementById('new-profile-input').value.trim();
        if(name) {
            document.getElementById('add-modal').classList.add('hidden');
            document.getElementById('profiles-list').innerHTML = '<h2>جاري الحفظ...</h2>';
            const { error } = await supabaseClient.from('profiles').upsert(
                { username: iptv.user, profile_name: name }, { onConflict: 'username,profile_name' }
            );
            if(error) showToast('خطأ: ' + error.message);
            else showToast('تمت إضافة المستخدم الجديد بنجاح');
            fetchProfilesFromSupabase();
        }
    }

    function selectProfile(name) {
        currentProfile = name;
        document.getElementById('current-profile-name').innerText = name;
        document.getElementById('profiles-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        loadPage('movies');
    }

    function changeProfile() { fetchProfilesFromSupabase(); }

    // --- المحرك البرمجي للبحث الفوري الشامل في المكتبة الكاملة للمزود ---
    function handleSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const container = document.getElementById('rows-container');
            
            if (query === '') {
                loadPage(currentTab); // في حال مسح خانة البحث نعيد الفئات الافتراضية للتبويب الحالي
                return;
            }
            
            container.innerHTML = '<h2 style="padding:5vw; text-align:center;">🔍 جاري البحث العالمي الشامل في كامل مكتبة السيرفر الرئيسية...</h2>';
            document.getElementById('continue-watching-container').innerHTML = ''; 

            let action = currentTab === 'movies' ? 'get_vod_streams' : (currentTab === 'series' ? 'get_series' : 'get_live_streams');
            
            try {
                const res = await fetch(`${iptv.domain}/player_api.php?username=${iptv.user}&password=${iptv.pass}&action=${action}`);
                const allItems = await res.json();
                
                // فلترة مصفوفة السيرفر بالكامل جافاسكربت بحثاً عن نص المطابقة
                const filteredResults = allItems.filter(item => {
                    const name = (item.name || item.title || '').toLowerCase();
                    return name.includes(query);
                });
                
                container.innerHTML = '';
                if(filteredResults.length > 0) {
                    buildRow(`نتائج البحث الشامل عن: "${query}" (${filteredResults.length} عنصر)`, filteredResults.slice(0, 100), currentTab === 'movies' ? 'movie' : (currentTab === 'series' ? 'series' : 'live'));
                } else {
                    container.innerHTML = '<h2 style="padding:5vw; text-align:center; color:var(--primary);">❌ لم يتم العثور على أي نتائج تطابق بحثك في كامل السيرفر.</h2>';
                }
            } catch (e) {
                container.innerHTML = '<h2 style="padding:5vw; text-align:center;">تعذر إتمام البحث العالمي، يرجى التحقق من الشبكة.</h2>';
            }
        }, 700); // تأخير 700 ملي ثانية لحماية المعالج من تكرار الطلبات أثناء ضغط الأزرار بالكيبورد
    }

    // --- تحميل تبويبات القائمة ---
    async function loadPage(type) {
        currentTab = type;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(event && event.target && event.target.tagName === 'BUTTON') event.target.classList.add('active');
        document.getElementById('search-input').value = '';

        document.getElementById('rows-container').innerHTML = '<h2 style="padding:4vw;">جاري استدعاء البيانات من السيرفر...</h2>';
        document.getElementById('continue-watching-container').innerHTML = ''; 

        if (type === 'movies') {
            await loadSupabaseRows('user_activity', `متابعة مشاهدة الأفلام`, 'movie');
            await fetchAndBuildRows('get_vod_categories', 'get_vod_streams', 'movie');
        } else if (type === 'series') {
            await loadSupabaseRows('user_activity', `متابعة مشاهدة المسلسلات`, 'series');
            await fetchAndBuildRows('get_series_categories', 'get_series', 'series');
        } else if (type === 'live') {
            await fetchAndBuildRows('get_live_categories', 'get_live_streams', 'live');
        } else if (type === 'favorites') {
            await loadSupabaseRows('favorites', `قائمة مفضلاتي الشاملة`, null);
            document.getElementById('rows-container').innerHTML = ''; 
        }
    }

    async function fetchAndBuildRows(catAction, streamAction, itemType) {
        const container = document.getElementById('rows-container');
        try {
            const resCat = await fetch(`${iptv.domain}/player_api.php?username=${iptv.user}&password=${iptv.pass}&action=${catAction}`);
            const cats = await resCat.json(); container.innerHTML = '';

            for (let i = 0; i < Math.min(cats.length, 6); i++) {
                const resStreams = await fetch(`${iptv.domain}/player_api.php?username=${iptv.user}&password=${iptv.pass}&action=${streamAction}&category_id=${cats[i].category_id}`);
                const streams = await resStreams.json();
                if(streams.length > 0) buildRow(cats[i].category_name, streams.slice(0, 20), itemType);
            }
        } catch (e) { container.innerHTML = '<h2 style="padding:4vw;">خطأ في الاتصال بالسيرفر</h2>'; }
    }

    let tIndex = 200;
    function buildRow(title, items, type) {
        const wrapper = document.createElement('div'); wrapper.className = 'row-container';
        const btnRight = document.createElement('button'); btnRight.className = 'scroll-btn right focusable'; btnRight.innerHTML = '▶';
        const btnLeft = document.createElement('button'); btnLeft.className = 'scroll-btn left focusable'; btnLeft.innerHTML = '◀';
        
        wrapper.innerHTML = `<div class="row-title">${title}</div>`;
        const inner = document.createElement('div'); inner.className = 'row-inner';

        btnRight.onclick = () => inner.scrollBy({ left: 800, behavior: 'smooth' });
        btnLeft.onclick = () => inner.scrollBy({ left: -800, behavior: 'smooth' });

        items.forEach(item => {
            const card = document.createElement('button');
            card.className = 'card focusable';
            card.setAttribute('data-title', (item.name || item.title || '').toLowerCase());
            
            const imgUrl = item.stream_icon || item.cover || 'https://via.placeholder.com/300x450/222/fff?text=No+Poster';
            card.innerHTML = `<img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/300x450/222/fff?text=Poster'">`;
            
            card.addEventListener('focus', (e) => {
                e.target.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
            });

            card.onclick = () => type === 'live' ? playStream(item.stream_id, 'live', '') : openDetails(item, type);
            inner.appendChild(card);
        });
        
        wrapper.appendChild(btnRight); wrapper.appendChild(inner); wrapper.appendChild(btnLeft);
        document.getElementById('rows-container').appendChild(wrapper);
    }

    async function loadSupabaseRows(tableName, rowTitle, filterType) {
        const container = document.getElementById('continue-watching-container');
        try {
            let query = supabaseClient.from(tableName).select('*').eq('username', iptv.user).eq('profile_name', currentProfile);
            if (filterType) query = query.eq('item_type', filterType);
            if (tableName === 'user_activity') query = query.order('updated_at', { ascending: false });

            const { data } = await query;
            if(data && data.length > 0) {
                const wrapper = document.createElement('div'); wrapper.className = 'row-container';
                const btnRight = document.createElement('button'); btnRight.className = 'scroll-btn right focusable'; btnRight.innerHTML = '▶';
                const btnLeft = document.createElement('button'); btnLeft.className = 'scroll-btn left focusable'; btnLeft.innerHTML = '◀';
                
                wrapper.innerHTML = `<div class="row-title">${rowTitle}</div>`;
                const inner = document.createElement('div'); inner.className = 'row-inner';
                btnRight.onclick = () => inner.scrollBy({ left: 800, behavior: 'smooth' });
                btnLeft.onclick = () => inner.scrollBy({ left: -800, behavior: 'smooth' });

                data.forEach(row => {
                    const obj = row.item_data; if(!obj) return;
                    const card = document.createElement('button');
                    card.className = 'card focusable'; 
                    card.setAttribute('data-title', (obj.name || obj.title || '').toLowerCase());
                    const progress = row.resume_time > 0 ? Math.min((row.resume_time / 7200) * 100, 100) : 0;
                    
                    card.innerHTML = `
                        <img src="${obj.stream_icon || obj.cover}">
                        ${tableName === 'user_activity' ? `<div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>` : ''}
                    `;
                    card.addEventListener('focus', (e) => e.target.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" }));
                    
                    // عند النقر على عنصر المتابعة، يتم تمرير وقت الاستئناف المخزن مباشرة لضمان عدم فقده
                    card.onclick = () => {
                        activeStreamData = { ...obj, type: row.item_type, id: row.movie_id, resume_time: row.resume_time };
                        openDetails(obj, row.item_type);
                    };
                    inner.appendChild(card);
                });
                wrapper.appendChild(btnRight); wrapper.appendChild(inner); wrapper.appendChild(btnLeft);
                container.appendChild(wrapper);
            }
        } catch(e) {}
    }

    // --- شاشة البيانات المقسمة يمين ويسار بتنظيم دقيق لـ 65 بوصة ---
    async function openDetails(item, type) {
        history.pushState({view: 'details'}, 'Details', '#details');
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('details-screen').classList.remove('hidden');
        document.getElementById('episodes-container').innerHTML = '';
        
        const id = item.stream_id || item.series_id || (activeStreamData ? activeStreamData.id : null);
        
        // جلب نقطة وصول المشاهدة الصحيحة سحابياً لمنع مشكلة التصفير والتأكد منها قبل إعطاء أمر التشغيل
        try {
            const { data: currentAct } = await supabaseClient.from('user_activity')
                .select('resume_time')
                .eq('username', iptv.user)
                .eq('profile_name', currentProfile)
                .eq('movie_id', String(id))
                .maybeSingle();
                
            let liveResumeTime = currentAct ? currentAct.resume_time : 0;
            activeStreamData = { ...item, type, id, resume_time: liveResumeTime };
        } catch (err) {
            activeStreamData = { ...item, type, id, resume_time: 0 };
        }

        document.getElementById('detail-title').innerText = item.name || item.title || 'بدون اسم';
        document.getElementById('detail-poster').src = item.stream_icon || item.cover;
        document.getElementById('details-screen').style.backgroundImage = `linear-gradient(to right, rgba(10,10,10,1) 40%, rgba(10,10,10,0.8) 100%), url('${item.stream_icon || item.cover}')`;

        let action = type === 'movie' ? `get_vod_info&vod_id=${id}` : `get_series_info&series_id=${id}`;
        try {
            const res = await fetch(`${iptv.domain}/player_api.php?username=${iptv.user}&password=${iptv.pass}&action=${action}`);
            const data = await res.json(); const info = data.info || {};
            
            document.getElementById('detail-desc').innerText = info.plot || info.description || 'لا يوجد وصف متاح لهذا العنصر.';
            document.getElementById('detail-meta').innerHTML = `<span>${info.genre || 'غير مصنف'}</span> | <span>${info.year || ''}</span>`;

            let actionsHtml = `<button class="action-btn fav focusable" id="fav-btn" onclick="toggleFavorite()">❤ أضف للمفضلة</button>`;
            if (type === 'movie') {
                actionsHtml = `<button class="action-btn focusable" onclick="playStream('${id}', 'movie', '${item.container_extension || 'mkv'}')">▶ تشغيل الفيلم</button>` + actionsHtml;
            } else if (type === 'series' && data.episodes) {
                actionsHtml += `<select id="season-selector" class="seasons-select focusable"></select>`;
            }
            
            document.getElementById('detail-actions').innerHTML = actionsHtml;
            checkIfFavorite(); 

            if (activeStreamData.resume_time > 0) {
                showToast(`سيتم استئناف العرض تلقائياً من الدقيقة: ${Math.floor(activeStreamData.resume_time / 60)}`);
            }

            setTimeout(() => { const firstBtn = document.querySelector('#detail-actions .action-btn'); if(firstBtn) firstBtn.focus(); }, 100);
            if (type === 'series' && data.episodes) renderSeasons(data.episodes);
        } catch (e) {
            document.getElementById('detail-actions').innerHTML = '<button class="action-btn focusable" onclick="history.back()">رجوع</button>';
        }
    }

    async function checkIfFavorite() {
        const { data } = await supabaseClient.from('favorites').select('id').eq('username', iptv.user).eq('profile_name', currentProfile).eq('item_id', String(activeStreamData.id));
        const favBtn = document.getElementById('fav-btn');
        if (data && data.length > 0) {
            favBtn.innerText = '❌ إزالة من المفضلة'; favBtn.style.background = 'var(--primary)';
        }
    }

    async function toggleFavorite() {
        const { data } = await supabaseClient.from('favorites').select('id').eq('username', iptv.user).eq('profile_name', currentProfile).eq('item_id', String(activeStreamData.id));
        const favBtn = document.getElementById('fav-btn');
        
        if (data && data.length > 0) {
            await supabaseClient.from('favorites').delete().eq('id', data[0].id);
            favBtn.innerText = '❤ أضف للمفضلة'; favBtn.style.background = 'rgba(40,40,40,0.8)';
            showToast('تم الحذف من المفضلات السحابية');
        } else {
            const { error } = await supabaseClient.from('favorites').insert([{
                username: iptv.user, profile_name: currentProfile,
                item_id: String(activeStreamData.id), item_type: activeStreamData.type, item_data: activeStreamData
            }]);
            if(error) { showToast('خطأ: ' + error.message); return; }
            favBtn.innerText = '❌ إزالة من المفضلة'; favBtn.style.background = 'var(--primary)';
            showToast('تم الحفظ بالمفضلة السحابية');
        }
    }

    function renderSeasons(episodesObj) {
        const select = document.getElementById('season-selector'); select.innerHTML = '';
        const seasons = Object.keys(episodesObj);
        seasons.forEach(s => {
            let opt = document.createElement('option'); opt.value = s; opt.innerText = `الموسم ${s}`; select.appendChild(opt);
        });
        select.onchange = () => renderEpisodes(episodesObj[select.value]);
        if(seasons.length > 0) renderEpisodes(episodesObj[seasons[0]]);
    }

    function renderEpisodes(epsList) {
        const container = document.getElementById('episodes-container'); container.innerHTML = '';
        epsList.forEach(ep => {
            const div = document.createElement('button'); div.className = 'ep-card focusable'; 
            div.innerHTML = `<span>الحلقة ${ep.episode_num || '-'} ${ep.title ? '- '+ep.title : ''}</span> <span>▶</span>`;
            
            // عند تشغيل حلقة من مسلسل، نتحقق من تقدمها الفردي في الجدول سحابياً
            div.onclick = async () => {
                let backupIcon = activeStreamData ? activeStreamData.stream_icon : '';
                let backupCover = activeStreamData ? activeStreamData.cover : '';
                
                activeStreamData = { id: ep.id, type: 'series', name: `الحلقة ${ep.episode_num}`, stream_icon: backupIcon, cover: backupCover };
                
                try {
                    const { data: epAct } = await supabaseClient.from('user_activity').select('resume_time').eq('username', iptv.user).eq('profile_name', currentProfile).eq('movie_id', String(ep.id)).maybeSingle();
                    activeStreamData.resume_time = epAct ? epAct.resume_time : 0;
                } catch(err) { activeStreamData.resume_time = 0; }
                
                playStream(ep.id, 'series', ep.container_extension || 'mkv');
            }; 
            container.appendChild(div);
        });
    }

    // --- مشغل وسيرفر الفيديو القياسي (مصحح بالكامل لعمل الاستئناف التلقائي للأبد) ---
    const video = document.getElementById('tv-video');
    function playStream(id, type, ext) {
        let url = type === 'live' ? `${iptv.domain}/${iptv.user}/${iptv.pass}/${id}` : `${iptv.domain}/${type === 'movie' ? 'movie' : 'series'}/${iptv.user}/${iptv.pass}/${id}.${ext}`;
        
        history.pushState({view: 'player'}, 'Player', '#player');
        document.getElementById('details-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('player-container').classList.remove('hidden');
        
        isPlaying = true;
        
        // ربط الرابط بالمشغل الفعلي للشاشة مباشرة دون وسيط
        video.src = url; 
        video.load(); 
        
        // هندسة تشغيل الـ Smart TV المحدثة: ننتظر المتصفح يقرأ أبعاد وميتا الميديا، ثم نقفز فورا لوقت المشاهدة
        video.onloadedmetadata = () => {
            if (activeStreamData && activeStreamData.resume_time > 0) {
                video.currentTime = activeStreamData.resume_time;
                showToast(`تم استئناف المشاهدة من التوقيت المحفوظ.`);
            }
        };
        
        video.play().catch(e => console.log('خطأ مشغل الشاشة الداخلي:', e));
        // تم إلغاء حظر دالة saveActivity(0) التي كانت تصفر العداد هنا!
    }

    // المزامنة الدورية كل 15 ثانية إلى قاعدة البيانات
    video.addEventListener('timeupdate', () => {
        if(isPlaying && activeStreamData && activeStreamData.type !== 'live' && Math.floor(video.currentTime) > 0 && Math.floor(video.currentTime) % 15 === 0) { 
            saveActivity(Math.floor(video.currentTime));
        }
    });

    async function saveActivity(time) {
        try {
            // تم تنظيف نص onConflict تماماً من الفراغات ليعمل بشكل فوري مع قواعد Postgres العميقة
            await supabaseClient.from('user_activity').upsert({
                username: iptv.user, profile_name: currentProfile, movie_id: String(activeStreamData.id), 
                item_type: activeStreamData.type, resume_time: time, item_data: activeStreamData
            }, { onConflict: 'username,profile_name,movie_id' });
        } catch(e) {}
    }

    // --- محرك التنقل الحركي عبر أزرار D-Pad للريموت ---
    document.addEventListener('keydown', (e) => {
        if (isPlaying) {
            if(e.keyCode === 37) video.currentTime -= 15;
            if(e.keyCode === 39) video.currentTime += 15;
            if(e.keyCode === 13) video.paused ? video.play() : video.pause();
            return;
        }

        const KEYS = [37, 38, 39, 40];
        if (KEYS.includes(e.keyCode)) {
            if(document.activeElement.tagName === 'INPUT' && (e.keyCode === 37 || e.keyCode === 39)) return; 

            e.preventDefault();
            let current = document.activeElement;
            if (!current || !current.classList.contains('focusable')) {
                const first = document.querySelector('.focusable'); if(first) first.focus(); return;
            }

            let rect = current.getBoundingClientRect();
            let focusables = Array.from(document.querySelectorAll('.focusable')).filter(el => el.offsetParent !== null);
            let bestMatch = null; let minDistance = Infinity;

            focusables.forEach(f => {
                if(f === current) return;
                let r = f.getBoundingClientRect();
                let dx = 0, dy = 0, dist = Infinity;

                if(e.keyCode === 37 && r.right <= rect.left) { 
                    dx = rect.left - r.right; dy = Math.abs((rect.top+rect.bottom)/2 - (r.top+r.bottom)/2); dist = dx + dy*2;
                } else if(e.keyCode === 39 && r.left >= rect.right) { 
                    dx = r.left - rect.right; dy = Math.abs((rect.top+rect.bottom)/2 - (r.top+r.bottom)/2); dist = dx + dy*2;
                } else if(e.keyCode === 38 && r.bottom <= rect.top) { 
                    dy = rect.top - r.bottom; dx = Math.abs((rect.left+rect.right)/2 - (r.left+r.right)/2); dist = dy + dx*2;
                } else if(e.keyCode === 40 && r.top >= rect.bottom) { 
                    dy = r.top - rect.bottom; dx = Math.abs((rect.left+rect.right)/2 - (r.left+r.right)/2); dist = dy + dx*2;
                }
                if(dist < minDistance) { minDistance = dist; bestMatch = f; }
            });

            if(bestMatch) {
                bestMatch.focus();
                bestMatch.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            }
        }
    });

    window.addEventListener('scroll', () => {
        const header = document.getElementById('main-header');
        if(window.scrollY > 50) header.classList.add('scrolled');
        else header.classList.remove('scrolled');
    });

    window.addEventListener('popstate', (e) => {
        if (isPlaying) {
            isPlaying = false; video.pause(); 
            video.src = ""; video.load(); // تحرير فوري لذاكرة الشاشة لتوفير مساحة للرامات العشوائية
            document.getElementById('player-container').classList.add('hidden');
            if(activeStreamData && activeStreamData.type === 'live') document.getElementById('main-screen').classList.remove('hidden');
            else document.getElementById('details-screen').classList.remove('hidden');
        } else {
            document.getElementById('details-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            loadPage(currentTab); // العودة السريعة وتحديث العدادات بصرياً
        }
    });
</script>

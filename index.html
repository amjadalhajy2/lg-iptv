<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Smart IPTV - Netflix Style</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #141414; --primary: #e50914; --text: #fff; --card-w: 220px; --card-h: 330px; }
        body { 
            background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; overflow-y: auto; user-select: none;
        }
        ::-webkit-scrollbar { display: none; }
        
        /* شاشة تسجيل الدخول */
        #login-screen { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 100%), url('https://assets.nflxext.com/ffe/siteui/vlv3/9d3533b2-0e2b-40b2-95e0-fa47f50dfeb9/web/SA-ar-20240311-popsignuptwoweeks-perspective_alpha_website_large.jpg');
            background-size: cover; background-position: center;
        }
        .login-box { background: rgba(0,0,0,0.8); padding: 50px; border-radius: 8px; width: 420px; box-sizing: border-box; }
        input { 
            width: 100%; padding: 15px; margin: 12px 0; border-radius: 4px; border: none; background: #333; color: white; font-size: 18px; outline: none; box-sizing: border-box;
        }
        input:focus { background: #444; border-bottom: 3px solid var(--primary); }
        button { 
            width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 4px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 15px; outline: none;
        }
        button:focus, button:hover { background: #b20710; transform: scale(1.02); }

        /* الشاشة الرئيسية */
        .hidden { display: none !important; }
        nav { 
            position: fixed; top: 0; width: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); 
            padding: 20px 60px; display: flex; align-items: center; gap: 40px; z-index: 100; box-sizing: border-box;
        }
        nav h1 { color: var(--primary); margin: 0; font-size: 36px; font-weight: 900; }
        .nav-links span { font-size: 20px; cursor: pointer; opacity: 0.7; transition: 0.2s; padding: 5px 15px; outline: none; }
        .nav-links span:focus, .nav-links span:hover, .nav-links span.active { opacity: 1; font-weight: bold; transform: scale(1.08); }

        /* البوستر العملاق (Hero) */
        #hero-banner {
            width: 100%; height: 75vh; background-size: cover; background-position: center top;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 60px; box-sizing: border-box;
            background-image: linear-gradient(to top, var(--bg) 5%, transparent 70%);
        }
        #hero-title { font-size: 65px; font-weight: bold; margin-bottom: 15px; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); }
        #hero-desc { font-size: 22px; max-width: 650px; text-shadow: 1px 1px 4px rgba(0,0,0,0.9); line-height: 1.6; opacity: 0.9; }

        /* صفوف نتفلكس */
        .category-row { margin: 30px 0 30px 60px; }
        .category-title { font-size: 26px; font-weight: bold; margin-bottom: 15px; padding-right: 5px; }
        .row-inner { display: flex; gap: 18px; overflow-x: auto; scroll-behavior: smooth; padding: 15px 5px; }
        
        .movie-card {
            flex: 0 0 auto; width: var(--card-w); height: var(--card-h); border-radius: 6px; overflow: hidden; position: relative;
            cursor: pointer; outline: none; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); background: #222;
        }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        .movie-card:hover, .movie-card:focus {
            transform: scale(1.12) translateY(-8px); border: 3px solid var(--text); z-index: 10; box-shadow: 0 12px 25px rgba(0,0,0,0.8);
        }
        
        /* مؤشر تقدم المشاهدة */
        .progress-bar { position: absolute; bottom: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.25); }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; }

        /* حاوية المشغل الفول سكرين */
        #tv-player-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; 
            display: flex; align-items: center; justify-content: center;
        }
        video { width: 100%; height: 100%; background: #000; outline: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="color: var(--primary); text-align: center; margin-bottom: 30px;">تطبيق IPTV</h1>
            <input type="text" id="xtream-domain" placeholder="رابط السيرفر (http://...)" tabindex="1">
            <input type="text" id="xtream-user" placeholder="اسم المستخدم" tabindex="2">
            <input type="password" id="xtream-pass" placeholder="كلمة المرور" tabindex="3">
            <button onclick="saveCredentials()" tabindex="4">تسجيل الدخول</button>
        </div>
    </div>

    <div id="main-screen" class="hidden">
        <nav id="navbar">
            <h1>STREAM</h1>
            <div class="nav-links">
                <span class="active" tabindex="5" onclick="loadContent('movies')">الأفلام</span>
                <span tabindex="6" onclick="loadContent('series')">المسلسلات</span>
                <span tabindex="7" onclick="loadContent('live')">القنوات الحية</span>
            </div>
            <div style="flex-grow: 1;"></div>
            <div class="nav-links"><span tabindex="8" onclick="logout()">خروج</span></div>
        </nav>

        <div id="hero-banner">
            <div id="hero-title">جاري التجهيز...</div>
            <div id="hero-desc">مرحباً بك، اختر تبويب العرض للبدء في تصفح مكتبتك السحابية الذكية.</div>
        </div>

        <div id="content-container" style="margin-top: -120px; position: relative; z-index: 10;"></div>
    </div>

    <div id="tv-player-container" class="hidden">
        <video id="tv-video" controls autoplay playsinline webkit-playsinline>
            <source id="vid-mkv" src="" type="video/x-matroska">
            <source id="vid-mp4" src="" type="video/mp4">
        </video>
    </div>

<script>
    // ربط مكتبة سوبابيس
    const SUPABASE_URL = 'https://kpfymvtyqbyjmlqfgujo.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_g7dHfpmPHcQwAWsO9FFuGw_4lG8fyLc'; 
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser, currentPass, currentDomain;
    let isPlaying = false;
    let currentMovieId = null;
    let tabIndexCounter = 10;

    window.onload = () => {
        if (localStorage.getItem('xtream_user')) {
            currentUser = localStorage.getItem('xtream_user');
            currentPass = localStorage.getItem('xtream_pass');
            currentDomain = localStorage.getItem('xtream_domain');
            showMainScreen();
        } else {
            document.getElementById('xtream-domain').focus();
        }
    };

    function saveCredentials() {
        const domain = document.getElementById('xtream-domain').value.trim();
        const user = document.getElementById('xtream-user').value.trim();
        const pass = document.getElementById('xtream-pass').value.trim();
        if (!domain || !user || !pass) return;

        currentDomain = domain.endsWith('/') ? domain.slice(0, -1) : domain;
        currentUser = user; currentPass = pass;
        
        localStorage.setItem('xtream_domain', currentDomain);
        localStorage.setItem('xtream_user', currentUser);
        localStorage.setItem('xtream_pass', currentPass);
        showMainScreen();
    }

    function logout() { localStorage.clear(); location.reload(); }

    function showMainScreen() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        loadContent('movies');
    }

    async function loadContent(type) {
        // تحديث حالة الأزرار النشطة بصرياً
        document.querySelectorAll('.nav-links span').forEach(el => el.classList.remove('active'));
        event?.target?.classList?.add('active');

        document.getElementById('content-container').innerHTML = '<h2 style="margin:60px; text-align:center;">جاري جلب تصنيفات المحتوى...</h2>';
        
        let catAction = type === 'movies' ? 'get_vod_categories' : (type === 'series' ? 'get_series_categories' : 'get_live_categories');
        let streamAction = type === 'movies' ? 'get_vod_streams' : (type === 'series' ? 'get_series' : 'get_live_streams');

        try {
            const catRes = await fetch(`${currentDomain}/player_api.php?username=${currentUser}&password=${currentPass}&action=${catAction}`);
            const categories = await catRes.json();
            const targetedCategories = categories.slice(0, 5); // أخذ أول 5 صفوف لضمان خفة التطبيق

            document.getElementById('content-container').innerHTML = '';
            
            // جلب المزامنة من سوبابيس دفعة واحدة لتقليص الاستدعاءات
            let userActivity = [];
            try {
                const { data } = await supabaseClient.from('user_activity').select('*').eq('username', currentUser);
                if (data) userActivity = data;
            } catch(e) { console.log("سوبابيس قيد التهيئة", e); }

            for (let i = 0; i < targetedCategories.length; i++) {
                const cat = targetedCategories[i];
                const streamRes = await fetch(`${currentDomain}/player_api.php?username=${currentUser}&password=${currentPass}&action=${streamAction}&category_id=${cat.category_id}`);
                const streams = await streamRes.json();
                
                if(streams.length > 0) {
                    if(i === 0 && streams[0]) updateHeroSection(streams[0], type);
                    buildNetflixRow(cat.category_name, streams.slice(0, 15), type, userActivity);
                }
            }
            
            // تفعيل التمرير عبر بكرة ريموت الماجيك تلقائياً
            bindMagicRemoteWheel();

        } catch (error) {
            document.getElementById('content-container').innerHTML = '<h2 style="margin:60px; color:var(--primary); text-align:center;">فشل الاتصال بمزود خدمة IPTV.</h2>';
        }
    }

    function updateHeroSection(item, type) {
        const title = item.name || item.title;
        const img = item.stream_icon || item.cover || '';
        document.getElementById('hero-title').innerText = title;
        if(img) {
            document.getElementById('hero-banner').style.backgroundImage = `linear-gradient(to top, var(--bg) 8%, rgba(20,20,20,0) 85%), url('${img}')`;
        }
    }

    function buildNetflixRow(rowTitle, items, type, userActivity) {
        const container = document.getElementById('content-container');
        const rowWrapper = document.createElement('div');
        rowWrapper.className = 'category-row';
        rowWrapper.innerHTML = `<div class="category-title">${rowTitle}</div>`;
        
        const innerRow = document.createElement('div');
        innerRow.className = 'row-inner';

        items.forEach(item => {
            const id = item.stream_id || item.series_id;
            const activity = userActivity.find(act => act.movie_id == id);
            const resumeTime = activity ? activity.resume_time : 0;
            const progress = resumeTime > 0 ? Math.min((resumeTime / 7200) * 100, 100) : 0;

            const card = document.createElement('div');
            card.className = 'movie-card';
            card.setAttribute('tabindex', tabIndexCounter++);
            
            const imgUrl = item.stream_icon || item.cover || 'https://via.placeholder.com/220x330/222/fff?text=No+Image';
            card.innerHTML = `
                <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/220x330/222/fff?text=Poster'">
                ${resumeTime > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>` : ''}
            `;

            const triggerPlayback = () => {
                let streamUrl = '';
                if(type === 'movies') streamUrl = `${currentDomain}/movie/${currentUser}/${currentPass}/${id}.${item.container_extension || 'mkv'}`;
                else if(type === 'live') streamUrl = `${currentDomain}/${currentUser}/${currentPass}/${id}`;
                else return; // تخصيص جلب حلقات المسلسلات لاحقاً
                
                launchPlayer(streamUrl, resumeTime, id);
            };

            card.onclick = triggerPlayback;
            card.onkeydown = (e) => { if(e.keyCode === 13) triggerPlayback(); };
            
            innerRow.appendChild(card);
        });

        rowWrapper.appendChild(innerRow);
        container.appendChild(rowWrapper);
    }

    function bindMagicRemoteWheel() {
        document.querySelectorAll('.row-inner').forEach(row => {
            row.addEventListener('wheel', (e) => {
                e.preventDefault();
                row.scrollLeft += e.deltaY * 2.5; 
            });
        });
    }

    // إدارة المشغل وزر الرجوع الذكي (History Back Fix)
    const videoNode = document.getElementById('tv-video');

    function launchPlayer(url, resumeTime, id) {
        currentMovieId = id;
        isPlaying = true;
        
        // الخدعة الهندسية: ندفع حالة جديدة للتاريخ لمنع الخروج من التطبيق عند ضغط زر العودة
        history.pushState({view: 'player'}, 'Player', '#view-player');

        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('tv-player-container').classList.remove('hidden');

        document.getElementById('vid-mkv').src = url;
        document.getElementById('vid-mp4').src = url;
        
        videoNode.load();
        videoNode.onloadedmetadata = () => { if (resumeTime > 0) videoNode.currentTime = resumeTime; };
        videoNode.play();
    }

    // التقاط ضغط زر الـ Back من ريموت التلفاز
    window.addEventListener('popstate', (e) => {
        if (isPlaying) { unloadPlayer(); }
    });

    function unloadPlayer() {
        isPlaying = false;
        videoNode.pause();
        videoNode.src = ""; 
        document.getElementById('tv-player-container').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        loadContent('movies'); // إعادة التحديث السريع لعرض خطوط التقدم الجديدة بصرياً
    }

    // مزامنة النقاط التوقيتية لكل 5 ثوانٍ مع سوبابيس
    videoNode.addEventListener('timeupdate', () => {
        if (!isPlaying || !currentMovieId) return;
        const seconds = Math.floor(videoNode.currentTime);
        if (seconds > 0 && seconds % 5 === 0) {
            supabaseClient.from('user_activity').upsert({ 
                username: currentUser, 
                movie_id: currentMovieId, 
                resume_time: seconds 
            }, { onConflict: 'username, movie_id' }).then();
        }
    });

    // تحكم الأسهم الافتراضية للتقديم والتأخير أثناء المشاهدة
    document.addEventListener('keydown', (e) => {
        if (!isPlaying) return;
        if(e.keyCode === 37) videoNode.currentTime -= 10;
        else if(e.keyCode === 39) videoNode.currentTime += 10;
        else if(e.keyCode === 13) videoNode.paused ? videoNode.play() : videoNode.pause();
    });
</script>
</body>
</html>

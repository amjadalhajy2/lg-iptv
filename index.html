<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>Stream IPTV - Pro UI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0a0a0a; --primary: #e50914; --text: #ffffff; --card-w: 16vw; --card-h: 24vw; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow-x: hidden; user-select: none; }
        ::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }

        /* 1. الشريط العلوي الشفاف */
        header {
            position: fixed; top: 0; width: 100%; height: 10vh; padding: 0 4vw;
            background: transparent; /* شفاف بالكامل كما طلبت */
            display: flex; align-items: center; justify-content: space-between; z-index: 100; box-sizing: border-box;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }
        .logo { font-size: 2.5vw; font-weight: 900; color: var(--primary); letter-spacing: 2px; }
        .nav-links { display: flex; gap: 3vw; }
        .nav-item { font-size: 1.5vw; font-weight: 600; opacity: 0.7; cursor: pointer; padding: 0.5vw 1vw; outline: none; border-radius: 5px; transition: 0.3s; }
        .nav-item:focus, .nav-item:hover, .nav-item.active { opacity: 1; transform: scale(1.1); background: rgba(255,255,255,0.15); }
        .user-info { display: flex; align-items: center; gap: 1vw; font-size: 1.3vw; font-weight: bold; }

        /* 2. منطقة القوائم الرئيسية (بدون مساحة البوستر) */
        #main-content { padding-top: 12vh; min-height: 100vh; padding-bottom: 5vh; }
        .row-container { margin-bottom: 5vh; position: relative; }
        .row-title { font-size: 1.8vw; font-weight: bold; margin: 0 4vw 2vh 0; opacity: 0.9; text-shadow: 1px 1px 3px black; }
        .row-inner { display: flex; gap: 1.5vw; overflow-x: auto; padding: 1vh 4vw; scroll-behavior: smooth; }
        
        /* أزرار التمرير الجانبي الشفافة */
        .scroll-btn {
            position: absolute; top: 55%; transform: translateY(-50%);
            background: rgba(20,20,20,0.6); color: white; border: 0.1vw solid rgba(255,255,255,0.2);
            font-size: 2.5vw; width: 4vw; height: 4vw; border-radius: 50%; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);
            transition: 0.3s; outline: none;
        }
        .scroll-btn:hover, .scroll-btn:focus { background: var(--primary); border-color: var(--primary); transform: translateY(-50%) scale(1.1); }
        .scroll-btn.right { right: 1vw; }
        .scroll-btn.left { left: 1vw; }

        /* البطاقات */
        .card {
            flex: 0 0 auto; width: var(--card-w); height: var(--card-h); border-radius: 0.5vw; overflow: hidden; position: relative;
            background: #222; cursor: pointer; outline: none; transition: transform 0.3s ease, border 0.3s ease;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card:focus, .card:hover { transform: scale(1.08) translateY(-1vh); border: 0.3vw solid white; z-index: 5; box-shadow: 0 2vh 4vh rgba(0,0,0,0.8); }
        .progress-bar { position: absolute; bottom: 0; width: 100%; height: 0.6vh; background: rgba(255,255,255,0.3); }
        .progress-fill { height: 100%; background: var(--primary); }

        /* 3. شاشة التفاصيل المقسمة (يمين للبيانات / يسار للحلقات والأزرار) */
        #details-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 200;
            padding: 8vh 4vw; box-sizing: border-box; background-size: cover; background-position: center;
            box-shadow: inset 0 0 70vw 40vw rgba(0,0,0,0.95);
        }
        .details-layout { display: flex; gap: 5vw; height: 100%; }
        
        /* الجهة اليمنى (الصورة والوصف) */
        .details-right { width: 35%; display: flex; flex-direction: column; gap: 2vh; }
        .details-poster { width: 100%; border-radius: 1vw; box-shadow: 0 2vh 5vh rgba(0,0,0,0.9); }
        .details-title { font-size: 3.5vw; font-weight: bold; margin: 0; text-shadow: 2px 2px 5px black; }
        .details-meta { font-size: 1.3vw; color: #ccc; font-weight: 600; display: flex; gap: 1vw; }
        .details-desc { font-size: 1.2vw; line-height: 1.6; opacity: 0.85; text-shadow: 1px 1px 3px black; }

        /* الجهة اليسرى (الأزرار وقوائم الحلقات) */
        .details-left { width: 65%; display: flex; flex-direction: column; gap: 4vh; padding-top: 2vh; }
        .action-bar { display: flex; gap: 2vw; align-items: center; flex-wrap: wrap; }
        .action-btn { background: var(--text); color: black; border: none; padding: 1.5vh 3vw; font-size: 1.5vw; font-weight: bold; border-radius: 0.5vw; cursor: pointer; outline: none; transition: 0.3s; }
        .action-btn.fav { background: rgba(40,40,40,0.8); color: white; border: 0.1vw solid white; backdrop-filter: blur(5px); }
        .action-btn:focus, .action-btn:hover { transform: scale(1.05); background: var(--primary); color: white; border-color: var(--primary); }
        
        .seasons-select { background: rgba(30,30,30,0.8); color: white; padding: 1.5vh 2vw; font-size: 1.5vw; border: 0.1vw solid white; border-radius: 0.5vw; outline: none; cursor: pointer; }
        .seasons-select:focus { border-color: var(--primary); background: #000; }
        
        .episodes-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(18vw, 1fr)); gap: 1.5vw; overflow-y: auto; max-height: 60vh; padding-bottom: 5vh; }
        .ep-card { background: rgba(40,40,40,0.9); padding: 2vh; border-radius: 0.5vw; cursor: pointer; outline: none; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; border: 0.1vw solid transparent; }
        .ep-card:focus, .ep-card:hover { background: var(--text); color: black; transform: scale(1.05); border-color: white; }

        /* شاشة اختيار الملف الشخصي وتسجيل الدخول */
        #profiles-screen, #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--bg); }
        .profiles-container { display: flex; gap: 3vw; margin-top: 5vh; }
        .profile-card { width: 12vw; height: 12vw; background: #222; border-radius: 1vw; display: flex; align-items: center; justify-content: center; font-size: 2.5vw; font-weight: bold; cursor: pointer; outline: none; transition: 0.3s; border: 0.2vw solid transparent; }
        .profile-card:focus, .profile-card:hover { background: var(--text); color: black; transform: scale(1.1); border-color: var(--primary); }
        .login-box input { width: 25vw; padding: 1.5vh; margin: 1vh 0; font-size: 1.2vw; border-radius: 5px; border: none; outline: none; }
        .login-box button { width: 25vw; padding: 1.5vh; font-size: 1.5vw; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 2vh; }

        /* المشغل */
        #player-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; }
        video { width: 100%; height: 100%; outline: none; background: #000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box" style="text-align: center;">
            <h1 style="color: var(--primary); font-size: 3vw;">STREAM</h1>
            <input type="text" id="iptv-domain" placeholder="رابط السيرفر (http://...)">
            <input type="text" id="iptv-user" placeholder="اسم المستخدم">
            <input type="password" id="iptv-pass" placeholder="كلمة المرور">
            <button onclick="login()">تسجيل الدخول</button>
        </div>
    </div>

    <div id="profiles-screen" class="hidden">
        <h1 style="font-size: 3vw;">من يشاهد الآن؟</h1>
        <div class="profiles-container" id="profiles-list"></div>
        <button class="action-btn" style="margin-top:5vh;" onclick="addProfile()">+ مستخدم جديد</button>
    </div>

    <div id="main-screen" class="hidden">
        <header id="main-header">
            <div class="logo">STREAM</div>
            <div class="nav-links">
                <div class="nav-item active" tabindex="1" onclick="loadPage('movies')">الأفلام</div>
                <div class="nav-item" tabindex="2" onclick="loadPage('series')">المسلسلات</div>
                <div class="nav-item" tabindex="3" onclick="loadPage('live')">القنوات الحية</div>
                <div class="nav-item" tabindex="4" onclick="loadPage('favorites')">مفضلاتي</div>
            </div>
            <div class="user-info">
                <span id="current-profile-name"></span>
                <div class="nav-item" tabindex="5" onclick="changeProfile()" style="font-size: 1vw;">تبديل المستخدم</div>
            </div>
        </header>

        <div id="main-content">
            <div id="continue-watching-container"></div>
            <div id="rows-container"></div>
        </div>
    </div>

    <div id="details-screen" class="hidden">
        <div class="details-layout">
            <div class="details-right">
                <img id="detail-poster" class="details-poster" src="">
                <h1 id="detail-title" class="details-title"></h1>
                <div class="details-meta" id="detail-meta"></div>
                <p class="details-desc" id="detail-desc"></p>
            </div>
            
            <div class="details-left">
                <div class="action-bar" id="detail-actions">
                    </div>
                <div id="episodes-container" class="episodes-list"></div>
            </div>
        </div>
    </div>

    <div id="player-container" class="hidden">
        <video id="tv-video" controls autoplay playsinline webkit-playsinline>
            <source id="vid-mkv" src="" type="video/x-matroska">
            <source id="vid-mp4" src="" type="video/mp4">
        </video>
    </div>

<script>
    // --- تهيئة سوبابيس ---
    const supabaseUrl = 'https://kpfymvtyqbyjmlqfgujo.supabase.co';
    const supabaseKey = 'sb_publishable_g7dHfpmPHcQwAWsO9FFuGw_4lG8fyLc';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    let iptv = { domain: '', user: '', pass: '' };
    let currentProfile = '';
    let isPlaying = false;
    let activeStreamData = null; 

    window.onload = () => {
        if(localStorage.getItem('iptv_user')) {
            iptv = {
                domain: localStorage.getItem('iptv_domain'),
                user: localStorage.getItem('iptv_user'),
                pass: localStorage.getItem('iptv_pass')
            };
            fetchProfilesFromSupabase();
        }
    };

    function login() {
        iptv.domain = document.getElementById('iptv-domain').value.trim();
        iptv.user = document.getElementById('iptv-user').value.trim();
        iptv.pass = document.getElementById('iptv-pass').value.trim();
        if(!iptv.user) return;
        iptv.domain = iptv.domain.endsWith('/') ? iptv.domain.slice(0, -1) : iptv.domain;
        
        localStorage.setItem('iptv_domain', iptv.domain);
        localStorage.setItem('iptv_user', iptv.user);
        localStorage.setItem('iptv_pass', iptv.pass);
        fetchProfilesFromSupabase();
    }

    // --- نظام الملفات الشخصية السحابي ---
    async function fetchProfilesFromSupabase() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('profiles-screen').classList.remove('hidden');
        
        const container = document.getElementById('profiles-list');
        container.innerHTML = '<h2>جاري جلب المستخدمين...</h2>';

        try {
            const { data, error } = await supabaseClient.from('profiles').select('profile_name').eq('username', iptv.user);
            container.innerHTML = '';
            
            if(data && data.length > 0) {
                data.forEach((p, idx) => renderProfileCard(p.profile_name, idx));
            } else {
                // إنشاء ملف "العائلة" الافتراضي إذا كان الحساب جديداً
                await supabaseClient.from('profiles').insert([{ username: iptv.user, profile_name: 'العائلة' }]);
                renderProfileCard('العائلة', 0);
            }
        } catch (e) {
            container.innerHTML = '<h2>خطأ في الاتصال بقاعدة البيانات</h2>';
        }
    }

    function renderProfileCard(name, idx) {
        const card = document.createElement('div');
        card.className = 'profile-card focusable';
        card.tabIndex = 100 + idx;
        card.innerText = name;
        card.onclick = () => selectProfile(name);
        card.onkeypress = (e) => { if(e.key === 'Enter') selectProfile(name); };
        document.getElementById('profiles-list').appendChild(card);
    }

    async function addProfile() {
        let name = prompt('أدخل اسم المستخدم الجديد:');
        if(name) {
            await supabaseClient.from('profiles').upsert({ username: iptv.user, profile_name: name });
            fetchProfilesFromSupabase();
        }
    }

    function selectProfile(name) {
        currentProfile = name;
        document.getElementById('current-profile-name').innerText = name;
        document.getElementById('profiles-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        loadPage('movies'); // الصفحة الافتراضية بعد الدخول
    }

    function changeProfile() { fetchProfilesFromSupabase(); }

    // --- الواجهة والقوائم (البيانات من السيرفر) ---
    async function loadPage(type) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(event && event.target) event.target.classList.add('active');

        document.getElementById('rows-container').innerHTML = '<h2 style="padding:4vw;">جاري تحميل المحتوى...</h2>';
        document.getElementById('continue-watching-container').innerHTML = ''; 

        if (type === 'movies') {
            await loadSupabaseRows('user_activity', `متابعة مشاهدة الأفلام لـ (${currentProfile})`, 'movie');
            await fetchAndBuildRows('get_vod_categories', 'get_vod_streams', 'movie');
        } else if (type === 'series') {
            await loadSupabaseRows('user_activity', `متابعة مشاهدة المسلسلات لـ (${currentProfile})`, 'series');
            await fetchAndBuildRows('get_series_categories', 'get_series', 'series');
        } else if (type === 'live') {
            await fetchAndBuildRows('get_live_categories', 'get_live_streams', 'live');
        } else if (type === 'favorites') {
            await loadSupabaseRows('favorites', `قائمة مفضلاتي`, null); // null يجلب الأفلام والمسلسلات معاً
            document.getElementById('rows-container').innerHTML = ''; // إخفاء القوائم الأخرى
        }
    }

    async function fetchAndBuildRows(catAction, streamAction, itemType) {
        const container = document.getElementById('rows-container');
        try {
            const resCat = await fetch(`${iptv.domain}/player_api.php?username=${iptv.user}&password=${iptv.pass}&action=${catAction}`);
            const cats = await resCat.json();
            container.innerHTML = '';

            for (let i = 0; i < Math.min(cats.length, 6); i++) {
                const resStreams = await fetch(`${iptv.domain}/player_api.php?username=${iptv.user}&password=${iptv.pass}&action=${streamAction}&category_id=${cats[i].category_id}`);
                const streams = await resStreams.json();
                if(streams.length > 0) buildRow(cats[i].category_name, streams.slice(0, 15), itemType);
            }
        } catch (e) { container.innerHTML = '<h2 style="padding:4vw;">خطأ في الاتصال بسيرفر IPTV</h2>'; }
    }

    let tIndex = 200;
    function buildRow(title, items, type) {
        const wrapper = document.createElement('div'); wrapper.className = 'row-container';
        
        // أزرار التمرير الجانبي الشفافة
        const btnRight = document.createElement('button'); btnRight.className = 'scroll-btn right focusable'; btnRight.innerHTML = '▶';
        const btnLeft = document.createElement('button'); btnLeft.className = 'scroll-btn left focusable'; btnLeft.innerHTML = '◀';
        
        wrapper.innerHTML = `<div class="row-title">${title}</div>`;
        const inner = document.createElement('div'); inner.className = 'row-inner';

        // وظائف أزرار التمرير
        btnRight.onclick = () => inner.scrollBy({ left: 800, behavior: 'smooth' });
        btnLeft.onclick = () => inner.scrollBy({ left: -800, behavior: 'smooth' });

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card focusable'; card.tabIndex = tIndex++;
            const img = item.stream_icon || item.cover || 'https://via.placeholder.com/300x450/222/fff?text=No+Poster';
            
            card.innerHTML = `<img src="${img}" onerror="this.src='https://via.placeholder.com/300x450/222/fff?text=Error'">`;
            
            const handleClick = () => type === 'live' ? playStream(item.stream_id, 'live', '') : openDetails(item, type);
            card.onclick = handleClick;
            card.onkeypress = (e) => { if(e.key==='Enter') handleClick(); };
            
            inner.appendChild(card);
        });
        
        wrapper.appendChild(btnRight);
        wrapper.appendChild(inner);
        wrapper.appendChild(btnLeft);
        document.getElementById('rows-container').appendChild(wrapper);
    }

    // --- جلب بيانات سوبابيس (للمتابعة والمفضلات) ---
    async function loadSupabaseRows(tableName, rowTitle, filterType) {
        const container = document.getElementById('continue-watching-container');
        try {
            let query = supabaseClient.from(tableName).select('*').eq('username', iptv.user).eq('profile_name', currentProfile);
            if (filterType) query = query.eq('item_type', filterType);
            if (tableName === 'user_activity') query = query.order('updated_at', { ascending: false });

            const { data } = await query;
            if(data && data.length > 0) {
                const wrapper = document.createElement('div'); wrapper.className = 'row-container';
                const btnRight = document.createElement('button'); btnRight.className = 'scroll-btn right focusable'; btnRight.innerHTML = '▶';
                const btnLeft = document.createElement('button'); btnLeft.className = 'scroll-btn left focusable'; btnLeft.innerHTML = '◀';
                
                wrapper.innerHTML = `<div class="row-title">${rowTitle}</div>`;
                const inner = document.createElement('div'); inner.className = 'row-inner';
                btnRight.onclick = () => inner.scrollBy({ left: 800, behavior: 'smooth' });
                btnLeft.onclick = () => inner.scrollBy({ left: -800, behavior: 'smooth' });

                data.forEach(row => {
                    const obj = row.item_data; if(!obj) return;
                    const card = document.createElement('div');
                    card.className = 'card focusable'; card.tabIndex = tIndex++;
                    const progress = row.resume_time > 0 ? Math.min((row.resume_time / 7200) * 100, 100) : 0;
                    const imgUrl = obj.stream_icon || obj.cover;
                    
                    card.innerHTML = `
                        <img src="${imgUrl}">
                        ${tableName === 'user_activity' ? `<div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>` : ''}
                    `;
                    card.onclick = () => openDetails(obj, row.item_type);
                    card.onkeypress = (e) => { if(e.key==='Enter') openDetails(obj, row.item_type); };
                    inner.appendChild(card);
                });
                wrapper.appendChild(btnRight); wrapper.appendChild(inner); wrapper.appendChild(btnLeft);
                container.appendChild(wrapper);
            }
        } catch(e) { console.error(e); }
    }

    // --- شاشة التفاصيل المقسمة (يمين ويسار) ---
    async function openDetails(item, type) {
        history.pushState({view: 'details'}, 'Details', '#details');
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('details-screen').classList.remove('hidden');
        document.getElementById('episodes-container').innerHTML = '';
        
        const id = item.stream_id || item.series_id;
        activeStreamData = { ...item, type, id };

        // تعبئة الجهة اليمنى
        document.getElementById('detail-title').innerText = item.name || item.title || 'بدون اسم';
        document.getElementById('detail-poster').src = item.stream_icon || item.cover;
        document.getElementById('details-screen').style.backgroundImage = `linear-gradient(to right, rgba(10,10,10,1) 40%, rgba(10,10,10,0.8) 100%), url('${item.stream_icon || item.cover}')`;

        let action = type === 'movie' ? `get_vod_info&vod_id=${id}` : `get_series_info&series_id=${id}`;
        try {
            const res = await fetch(`${iptv.domain}/player_api.php?username=${iptv.user}&password=${iptv.pass}&action=${action}`);
            const data = await res.json();
            const info = data.info || {};
            
            document.getElementById('detail-desc').innerText = info.plot || info.description || 'لا يوجد وصف متاح.';
            document.getElementById('detail-meta').innerHTML = `<span>${info.genre || 'غير مصنف'}</span> | <span>${info.year || ''}</span>`;

            // تعبئة الجهة اليسرى (الأزرار والمواسم)
            let actionsHtml = `<button class="action-btn fav focusable" tabindex="50" id="fav-btn" onclick="toggleFavorite()">❤ أضف للمفضلة</button>`;
            
            if (type === 'movie') {
                actionsHtml = `<button class="action-btn focusable" tabindex="49" onclick="playStream('${id}', 'movie', '${item.container_extension || 'mkv'}')">▶ تشغيل الفيلم</button>` + actionsHtml;
            } else if (type === 'series' && data.episodes) {
                actionsHtml += `<select id="season-selector" class="seasons-select focusable" tabindex="51"></select>`;
            }
            
            document.getElementById('detail-actions').innerHTML = actionsHtml;
            checkIfFavorite(); // تحديث لون زر المفضلة

            if (type === 'series' && data.episodes) {
                renderSeasons(data.episodes);
            }
        } catch (e) {
            document.getElementById('detail-actions').innerHTML = '<button class="action-btn" onclick="history.back()">رجوع</button>';
        }
    }

    // --- نظام المفضلات السحابي ---
    async function checkIfFavorite() {
        const { data } = await supabaseClient.from('favorites').select('id').eq('username', iptv.user).eq('profile_name', currentProfile).eq('item_id', String(activeStreamData.id));
        const favBtn = document.getElementById('fav-btn');
        if (data && data.length > 0) {
            favBtn.innerText = '❌ إزالة من المفضلة';
            favBtn.style.background = 'var(--primary)';
        }
    }

    async function toggleFavorite() {
        const { data } = await supabaseClient.from('favorites').select('id').eq('username', iptv.user).eq('profile_name', currentProfile).eq('item_id', String(activeStreamData.id));
        const favBtn = document.getElementById('fav-btn');
        
        if (data && data.length > 0) {
            await supabaseClient.from('favorites').delete().eq('id', data[0].id);
            favBtn.innerText = '❤ أضف للمفضلة';
            favBtn.style.background = 'rgba(40,40,40,0.8)';
        } else {
            await supabaseClient.from('favorites').insert([{
                username: iptv.user, profile_name: currentProfile,
                item_id: String(activeStreamData.id), item_type: activeStreamData.type, item_data: activeStreamData
            }]);
            favBtn.innerText = '❌ إزالة من المفضلة';
            favBtn.style.background = 'var(--primary)';
        }
    }

    // --- المواسم والحلقات للمسلسلات ---
    function renderSeasons(episodesObj) {
        const select = document.getElementById('season-selector');
        select.innerHTML = '';
        const seasons = Object.keys(episodesObj);
        
        seasons.forEach(s => {
            let opt = document.createElement('option');
            opt.value = s; opt.innerText = `الموسم ${s}`;
            select.appendChild(opt);
        });

        select.onchange = () => renderEpisodes(episodesObj[select.value]);
        if(seasons.length > 0) renderEpisodes(episodesObj[seasons[0]]);
    }

    function renderEpisodes(epsList) {
        const container = document.getElementById('episodes-container');
        container.innerHTML = '';
        let tIdx = 60;
        epsList.forEach(ep => {
            const div = document.createElement('div');
            div.className = 'ep-card focusable'; div.tabIndex = tIdx++;
            div.innerHTML = `<span>الحلقة ${ep.episode_num || '-'} ${ep.title ? '- '+ep.title : ''}</span> <span>▶</span>`;
            
            const handlePlay = () => playStream(ep.id, 'series', ep.container_extension || 'mkv'); 
            div.onclick = handlePlay;
            div.onkeypress = (e) => { if(e.key === 'Enter') handlePlay(); };
            container.appendChild(div);
        });
    }

    // --- المشغل والمزامنة ---
    const video = document.getElementById('tv-video');
    function playStream(id, type, ext) {
        let url;
        if(type === 'live') {
            url = `${iptv.domain}/${iptv.user}/${iptv.pass}/${id}`; // القنوات غالباً لا تحتاج امتداد
        } else {
            let urlType = type === 'movie' ? 'movie' : 'series';
            url = `${iptv.domain}/${urlType}/${iptv.user}/${iptv.pass}/${id}.${ext}`;
        }
        
        history.pushState({view: 'player'}, 'Player', '#player');
        document.getElementById('details-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('player-container').classList.remove('hidden');
        
        isPlaying = true;
        document.getElementById('vid-mkv').src = url; document.getElementById('vid-mp4').src = url;
        video.load(); video.play();

        if(type !== 'live') saveActivity(0);
    }

    video.addEventListener('timeupdate', () => {
        if(isPlaying && activeStreamData && activeStreamData.type !== 'live' && Math.floor(video.currentTime) > 0 && Math.floor(video.currentTime) % 15 === 0) { 
            saveActivity(Math.floor(video.currentTime));
        }
    });

    async function saveActivity(time) {
        try {
            await supabaseClient.from('user_activity').upsert({
                username: iptv.user, profile_name: currentProfile, movie_id: String(activeStreamData.id), 
                item_type: activeStreamData.type, resume_time: time, item_data: activeStreamData
            }, { onConflict: 'username, profile_name, movie_id' });
        } catch(e) {}
    }

    // --- نظام الرجوع والتحكم ---
    window.addEventListener('popstate', (e) => {
        if (isPlaying) {
            isPlaying = false; video.pause(); video.src = "";
            document.getElementById('player-container').classList.add('hidden');
            if(activeStreamData && activeStreamData.type === 'live') {
                document.getElementById('main-screen').classList.remove('hidden');
            } else {
                document.getElementById('details-screen').classList.remove('hidden');
            }
        } else {
            document.getElementById('details-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            loadPage('movies'); // تحديث بصري عند العودة
        }
    });

</script>
</body>
</html>

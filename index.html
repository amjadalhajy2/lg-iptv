<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>تطبيق IPTV السحابي - LG TV</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #111; color: white; font-family: 'Segoe UI', sans-serif; 
            padding: 30px; text-align: center; margin: 0; overflow-x: hidden;
        }
        ::-webkit-scrollbar { display: none; }
        input, select { 
            padding: 15px; margin: 10px; width: 80%; max-width: 400px; 
            border-radius: 8px; border: 2px solid #444; background: #222; color: white; font-size: 18px; outline: none;
        }
        button { 
            background: #e50914; color: white; border: none; padding: 15px 30px; 
            margin-top: 10px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; outline: none;
        }
        button:focus, button:hover, input:focus, select:focus { 
            border-color: #fff; box-shadow: 0 0 15px #e50914; background: #b20710; transform: scale(1.05);
        }
        .hidden { display: none !important; }
        .movie-card { 
            background: #222; margin: 15px; padding: 15px; border-radius: 10px; 
            display: inline-block; width: 220px; vertical-align: top; transition: 0.3s ease; outline: none;
        }
        .movie-card img { width: 100%; border-radius: 8px; height: 300px; object-fit: cover; }
        .movie-card:focus, .movie-card:hover {
            transform: scale(1.1); background: #333; box-shadow: 0px 10px 20px rgba(229, 9, 20, 0.5); border: 2px solid #e50914;
        }
        .progress-bar { height: 6px; background: #555; margin-top: 15px; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: #e50914; width: 0%; transition: width 0.3s; }
        
        /* تنسيق طبقة المشغل لتغطية الشاشة بالكامل في التلفاز */
        #tv-player-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        video { width: 100%; height: 100%; outline: none; background: #000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-size: 40px; margin-top: 100px;">تسجيل الدخول</h1>
        <input type="text" id="xtream-domain" placeholder="رابط السيرفر" tabindex="1"><br>
        <input type="text" id="xtream-user" placeholder="اسم المستخدم" tabindex="2"><br>
        <input type="password" id="xtream-pass" placeholder="كلمة المرور" tabindex="3"><br>
        <button onclick="saveCredentialsAndLogin()" tabindex="4">دخول</button>
    </div>

    <div id="main-screen" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>المكتبة</h1>
            <button onclick="logout()" style="background: #555;">خروج</button>
        </div>
        <div id="movies-container"></div>
    </div>

    <div id="tv-player-container" class="hidden">
        <video id="tv-video" controls autoplay playsinline webkit-playsinline>
            <source id="vid-mkv" src="" type="video/x-matroska">
            <source id="vid-mp4" src="" type="video/mp4">
        </video>
    </div>

<script>
    // ==========================================
    // 1. إعدادات قاعدة بيانات سوبابيس (Supabase)
    // ==========================================
    const SUPABASE_URL = 'https://kpfymvtyqbyjmlqfgujo.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_g7dHfpmPHcQwAWsO9FFuGw_4lG8fyLc'; 
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = ''; let currentDomain = ''; let currentPass = '';
    let currentMovieId = null; let isPlaying = false;

    // ==========================================
    // 2. نظام تسجيل الدخول وتهيئة التطبيق
    // ==========================================
    window.onload = function() {
        const savedUser = localStorage.getItem('xtream_user');
        const savedPass = localStorage.getItem('xtream_pass');
        const savedDomain = localStorage.getItem('xtream_domain');

        if (savedUser && savedPass && savedDomain) {
            currentUser = savedUser; currentPass = savedPass; currentDomain = savedDomain;
            showMainScreen();
        } else {
            document.getElementById('xtream-domain').focus();
        }
    };

    function saveCredentialsAndLogin() {
        const domain = document.getElementById('xtream-domain').value.trim();
        const user = document.getElementById('xtream-user').value.trim();
        const pass = document.getElementById('xtream-pass').value.trim();

        if (!domain || !user || !pass) return;

        const cleanDomain = domain.endsWith('/') ? domain.slice(0, -1) : domain;
        localStorage.setItem('xtream_domain', cleanDomain);
        localStorage.setItem('xtream_user', user);
        localStorage.setItem('xtream_pass', pass);

        currentUser = user; currentPass = pass; currentDomain = cleanDomain;
        showMainScreen();
    }

    function logout() { localStorage.clear(); location.reload(); }

    function showMainScreen() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        fetchContent();
    }

    // ==========================================
    // 3. جلب المحتوى والمزامنة مع سوبابيس
    // ==========================================
    async function fetchContent() {
        document.getElementById('movies-container').innerHTML = '<h2>جاري التحميل...</h2>';
        const apiUrl = `${currentDomain}/player_api.php?username=${currentUser}&password=${currentPass}&action=get_vod_streams`;
        
        try {
            const response = await fetch(apiUrl);
            const movies = await response.json(); 

            // جلب بيانات المشاهدة السابقة من سوبابيس
            let userActivity = [];
            try {
                const { data } = await supabaseClient.from('user_activity').select('*').eq('username', currentUser);
                if (data) userActivity = data;
            } catch(e) { console.error("خطأ في جلب بيانات سوبابيس", e); }

            renderMovies(movies.slice(0, 50), userActivity); // عرض أول 50 فيلم للتجربة
        } catch (error) {
            document.getElementById('movies-container').innerHTML = '<h2>خطأ في الاتصال بالسيرفر</h2>';
        }
    }

    function renderMovies(movies, userActivity) {
        const container = document.getElementById('movies-container');
        container.innerHTML = '';

        movies.forEach((movie, index) => {
            // التحقق من وجود نقطة توقف في سوبابيس
            const activity = userActivity.find(act => act.movie_id == movie.stream_id);
            const resumeTime = activity ? activity.resume_time : 0;
            const progressPercent = resumeTime > 0 ? Math.min((resumeTime / 7200) * 100, 100) : 0;

            const ext = movie.container_extension || "mkv";
            const videoUrl = `${currentDomain}/movie/${currentUser}/${currentPass}/${movie.stream_id}.${ext}`;

            const card = document.createElement('div');
            card.className = 'movie-card focusable';
            card.setAttribute('tabindex', 10 + index); 

            card.innerHTML = `
                <img src="${movie.stream_icon}" onerror="this.src='https://via.placeholder.com/200x300'">
                <h3>${movie.name}</h3>
                ${resumeTime > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%"></div></div>` : ''}
            `;

            // عند الضغط على OK في الريموت
            card.onclick = () => startPlayer(videoUrl, resumeTime, movie.stream_id);
            card.addEventListener('keypress', (e) => { if (e.key === 'Enter') startPlayer(videoUrl, resumeTime, movie.stream_id); });

            container.appendChild(card);
        });
    }

    // ==========================================
    // 4. المشغل ونظام تتبع المشاهدة
    // ==========================================
    const videoElement = document.getElementById('tv-video');
    
    function startPlayer(url, resumeTime, movieId) {
        currentMovieId = movieId;
        isPlaying = true;
        
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('tv-player-container').classList.remove('hidden');

        document.getElementById('vid-mkv').src = url;
        document.getElementById('vid-mp4').src = url;
        
        videoElement.load();
        
        // الانتقال لنقطة التوقف
        videoElement.onloadedmetadata = () => {
            if (resumeTime > 0) videoElement.currentTime = resumeTime;
        };
        videoElement.play();
    }

    // حفظ نقطة التوقف في سوبابيس كل 5 ثوانٍ
    videoElement.addEventListener('timeupdate', () => {
        if (!isPlaying || !currentMovieId) return;
        const currentSeconds = Math.floor(videoElement.currentTime);
        
        // التحديث كل 5 ثوانٍ لتقليل الضغط على السيرفر
        if (currentSeconds > 0 && currentSeconds % 5 === 0) {
            syncToSupabase(currentSeconds);
        }
    });

    async function syncToSupabase(seconds) {
        await supabaseClient.from('user_activity').upsert({ 
            username: currentUser, 
            movie_id: currentMovieId, 
            resume_time: seconds 
        }, { onConflict: 'username, movie_id' });
    }

    // ==========================================
    // 5. التفاعل مع أزرار ريموت LG (الماجيك ريموت)
    // ==========================================
    document.addEventListener('keydown', (e) => {
        if (!isPlaying) return; // تفعيل الأزرار فقط أثناء عرض الفيديو

        switch(e.keyCode) {
            case 37: // سهم يسار (تأخير 10 ثوانٍ)
                videoElement.currentTime -= 10;
                break;
            case 39: // سهم يمين (تقديم 10 ثوانٍ)
                videoElement.currentTime += 10;
                break;
            case 13: // زر OK (تشغيل / إيقاف مؤقت)
                videoElement.paused ? videoElement.play() : videoElement.pause();
                break;
            case 461: // زر الرجوع (Back) الخاص بتلفاز LG
            case 27:  // زر الهروب (Esc) للتجربة على الكمبيوتر
            case 8:   // زر Backspace
                closePlayer();
                e.preventDefault(); // منع التلفاز من الخروج من التطبيق بالكامل
                break;
        }
    });

    function closePlayer() {
        isPlaying = false;
        videoElement.pause();
        videoElement.src = ""; // إفراغ الذاكرة
        document.getElementById('tv-player-container').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        fetchContent(); // إعادة تحميل الواجهة لتحديث أشرطة التقدم بصرياً
    }
</script>
</body>
</html>

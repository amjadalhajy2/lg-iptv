name: Build LG webOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install webOS CLI
      run: npm install -g @webos-tools/cli

    - name: Package App
      run: ares-package .

    - name: Upload IPK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: smart-iptv-lg-app
        path: "*.ipk"
